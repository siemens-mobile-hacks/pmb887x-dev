[board]
vendor = "LG"
model = "KE970"

cpu.type = "pmb8876"
cpu.rev = 0x10

[peripheral.FLASH0]
type = "cfi-flash"
bus = "EBU"
ebu.cs = 0
flash = { vid = 0x0089, pid = 0x88B0 }

[peripheral.SDRAM]
type = "sdram"
bus = "EBU"
ebu.cs = 1
ram.size = 0x2000000 # 32 MiB

[peripheral.LCD0]
type = "ili9320"
bus = "DIF"
width = 240
height = 320
rotation = 0
# TODO: does IL200 have different bit meanings compared to ILI932x?
flip_horizontal = true
bgr_filter = true
in = { CS = "DIF_CS1", CD = "DIF_CD", WR = "DIF_WR", RD = "DIF_RD", RESET = "DIF_RESET1" }

[peripheral.PMIC]
type = "pmb6812"
bus = "I2C"
addr = 0x08

[peripheral.AMP]
type = "lm4946"
bus = "I2C"
addr = 0x7D

[peripheral.SIM_CARD]
type = "sim-card"
bus = "SIM"
in = { RST = "SIM:CC_RST" }

[analog]
# M0  BATT_TEMP Battery temperature measure
# M1  RF_TEMP RF block temperature measure
# M2  JACK_TYPE Accessory type detect
# M7  H/W VERSION S-Gold2 H/W version detect
# M8  VSUPPLY Battery supply voltage measure
# M9  I_MONITOR Current consumption measure
# M10 REMOTE_ADC Remote control key detect
M_0 = { type = "resistor", value = 9300 }
M_7 = { type = "resistor", value = 14800 }
M_8 = { type = "resistor_divider", r1 = 330000, r2 = 220000, value = 3700 }
M_9 = { type = "resistor", value = 15000 }

[dsp]
ram0_value = 0x0801

[gpio.aliases]
DIF_HD = "OPEN_CLOSE_SW1"
MMCI_DAT1 = "OPEN_CLOSE_SW2"

[gpio.inputs]

# Slider
OPEN_CLOSE_SW2 = 1

[keyboard]
# LG firmware requires this to be held at startup, otherwise it'll do a charger boot
# poweron_key = "END_CALL"

# [KP_IN, KP_OUT, ..., KP_OUT]
SOFT_LEFT	= [0, 0]	# MENU
NAV_CENTER	= [0, 1]	# OK
SOFT_RIGHT	= [0, 2]	# SERCH
NAV_LEFT	= [5, 0]	# LEFT
NAV_RIGHT	= [5, 2]	# RIGHT

SEND		= [0, 3]	# KB_SND
CLEAR		= [1, 3]	# KB_CLR
END_CALL	= [5, 1]	# END

NUM1		= [1, 0]
NUM2		= [1, 1]
NUM3		= [1, 2]
NUM4		= [2, 0]
NUM5		= [2, 1]
NUM6		= [2, 2]
NUM7		= [3, 0]
NUM8		= [3, 1]
NUM9		= [3, 2]
STAR		= [4, 0]	# KB_STAR
NUM0		= [4, 1]	# 510
HASH		= [4, 2]	# KB_SHA

MUSIC		= [4, 3]	# KB_BGM
PTT         = [5, 3]    # shutter
CAMERA		= [5, 4]	# KB_CAM (side / shutter)
VOLUME_UP	= [2, 3]	# KB_UP
VOLUME_DOWN	= [3, 3]	# KB_DOWN
