.id 0x2
.type NATIVE
.size 0x200
.name SCCU
.qemu pmb887x-sccu
.descr Standby Clock Control Unit

.irq UNK
.irq WAKE

SPCR		0x10	Standby Power Control Register
	DPDN		0	1	VDD DSP Supply Domain Reset in Standby Mode
	APDN		1	1	Analog Supply Domain Reset in Standby Mode
	DROFF		5	1	Force DSP ROM Off Immediately
	DREN		6	1	Enable DSP ROM Power-Off When VCXO and Shaper Power Are Off

TDMINI		0x14	Sleep Duration Value Register
	TDMAIN		0	13	Duration (-1) of the Sleep Time in TDMA Frames

TDMOUT		0x18	Sleep Duration Status Register
	TDMAOUT		0	13	Number of Frames Minus 1 During Which the GSM Timer Remained Frozen

SLPCTRL		0x1C	Sleep Control Register
	REFEN		0	1	Reference Enable
	SLPEN		1	1	Sleep Enable
	SLPRST		2	1	Reset Sleep Counter
	SLPSTP		3	1	Sleep Stop
	REFERR		4	1	Reference Error Flag
	HWACTDI		5	1	Sleep Start Activation Disable

REFIN		0x20	Standby Clock Reference Input Register
	REFIN		0	13	MCU-Controlled Reference Value (1 LSB = 1.043 ppm)

REF			0x24	Reference Calibration Output Values Register
	REFOUT		0	13	Fine Reference Frequency Measurement (1 LSB = 1.043 ppm)
	REFPOS		16	13	Coarse Slow Crystal Frequency Measurement (1 LSB = 1/8 TDMA Frame)

NQTZ		0x28	Xtal Oscillator Number Register
	NQTZ		0	8	Number of Slow Xtal Oscillator Periods in One TDMA Frame

SCCTRL		0x2C	Switch Control Register
	UCSLP		0	1	Sleep Command
	UCWUP		1	1	Wakeup Command
	SSCRST		2	1	Reset Command

WAIT		0x30	Wakeup Timing Register
	PREWUP		0	2	Pre-Wakeup Time in TDMA Frames Minus 1
	WAIT		16	6	VCXO Wait Loop Duration

HWWAKEUP	0x34	Hardware Wakeup Control Register
	ICU_EN		0	1	Enable SCCU Wakeup by ICU Interrupt
	RTC_EN		8	1	Enable Sleep Mode Termination by RTC Block
	KPD_EN		9	1	Enable Sleep Mode Termination by Keypad
	SIM_EN		10	1	Enable Sleep Mode Termination by SIM Card Insertion/Removal
	EXT_EN		12	1	Enable Wakeup by CAPCOM or External Interrupt Pins

SCCUCLKSTA		0x40	Clock Status Register
	CPUCLK		0	1	Status of the MCU Clock
	GSMCLK		1	1	Status of the System Interface Clock

SCCUMSTA		0x44	State Machine Status Register
	UC_ON		0	1	SCCU State Machine Is in μC On State (S1)
	UC_OFF		1	1	SCCU State Machine Is in μC Off State (S2)
	TCXO_OFF	2	1	SCCU State Machine Is in TCXO Off State (S3)
	TCXO_ON		3	1	SCCU State Machine Is in TCXO On State (S4)
	SHAP_ON		4	1	SCCU State Machine Is in Shaper On State (S5)

WAKE_SRC	0x0A0
	*MOD_SRC

UNK_SRC		0x0A8
	*MOD_SRC
