.id 0xF000C032
.type MODULE
.size 0x200
.name SIM
.descr SIM Card Interface

.irq ERR
.irq IN
.irq OK

CLC				0x000
	*MOD_CLC

ID				0x008
	*MOD_ID

CON				0x020	SIM Control Register
	INCON		0	1	Character convention (0: direct; 1: inverse)
	SIMT0		1	1	Protocol mode (0: character; 1: hardware T=0)
	SIMIOL		2	1	SIM I/O line enable
	SIMEN		3	1	SIM interface enable
	SIMVCC		4	1	SIM supply voltage enable
	SIMRST		5	1	SIM reset output level
	ERROFF		6	1	Disable error signalling
	RPTOFF		7	1	Disable character retransmission
	APDWN		8	1	Automatic power-down enable
	SIMPDWN		9	1	Force automatic power-down
	SIMON		10	1	SIM clock enable
	CLKSEL		11	1	SIM clock selection
	CLKHIGH		12	1	Clock-stop level selection
	UARTON		13	1	UART and protocol clock enable
	SMCSWACT	14	1	Smart-card interface data switch
	SIMT1		15	1	Hardware T=1 / DMA transfer mode enable

BRF				0x024	SIM Baud Rate Factor Register
	BRF			0	7	Baud-rate factor F / (4D)

STAT			0x028	Status Register
	UARTOK		0	1	A byte was received or transmitted successfully
	PARINT		1	1	Parity error
	OVRRUN		2	1	Transmit or receive overrun
	T0END		3	1	Hardware T=0 instruction completed
	SIMDET		4	1	SIM presence input state
	CHTIMEOUT	5	1	Character timer expired
	UNK6		6	1
	UNK7		7	1
	UNK8		8	1

IRQEN			0x02C	SIM Event Enable Register
	ENOKINT		0	1	UARTOK event enable
	ENPAR		1	1	PARINT event enable
	ENOVR		2	1	OVRRUN event enable
	ENT0END		3	1	T0END event enable
	ENCHTIMER	4	1	Character timer event enable
	ENBWTTIMER	5	1	Block waiting timer event enable
	UNK6		6	1

RXSPC			0x030	Receive Spacing Register
	RXSPC		0	8	RX-to-TX spacing in 1/16 ETU

TXSPC			0x034	Transmit Spacing Register
	TXSPC		0	8	Extra TX-to-TX spacing in ETU

CHTIMER			0x038	Character Timer Register
	CHTIMER		0	24	Character wait timeout in ETU

UNK3C			0x03C
	VALUE		0	5

UNK40			0x040
	VALUE		0	11

BWT				0x044	Block Waiting Timer Register
	BWT			0	24	Block wait timeout in ETU

TXB				0x050	Transmit Buffer Register
	VALUE		0	8

RXB				0x054	Receive Buffer Register
	VALUE		0	8

INS				0x058	T=0 Instruction Class Register
	INS			0	8	Instruction byte
	INSDIR		8	1	Instruction direction (0: transmit; 1: receive)

P3				0x05C	T=0 Parameter 3 Register
	P3			0	8	Number of bytes to transmit or receive

SW1				0x060	T=0 Status Word 1 Register
	SW1			0	8

SW2				0x064	T=0 Status Word 2 Register
	SW2			0	8

IMSC			0x070	Interrupt Mask Control Register
	ERR			0	1	Status/error interrupt
	IN			1	1	SIM presence interrupt
	OK			2	1	Successful character interrupt

RIS				0x074	Raw Interrupt Status Register
	ERR			0	1	Status/error interrupt
	IN			1	1	SIM presence interrupt
	OK			2	1	Successful character interrupt

MIS				0x078	Masked Interrupt Status Register
	ERR			0	1	Status/error interrupt
	IN			1	1	SIM presence interrupt
	OK			2	1	Successful character interrupt

ICR				0x07C	Interrupt Clear Register
	ERR			0	1	Status/error interrupt
	IN			1	1	SIM presence interrupt
	OK			2	1	Successful character interrupt

ISR				0x080	Interrupt Set Register
	ERR			0	1	Status/error interrupt
	IN			1	1	SIM presence interrupt
	OK			2	1	Successful character interrupt

DMAE			0x084	DMA Enable Register
	OK			0	1	Successful-character DMA request enable
