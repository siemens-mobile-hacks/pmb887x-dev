.id 0xF047C000, 0xF047C012
.type MODULE
.qemu pmb887x-usb
.name USB
.size 0x900
.descr sci-worx USB device controller

.irq

EP_ENABLE_LOW		0x000	Endpoint Enable Register, endpoints 0-7
	ENDPOINTS	0	8

EP_ENABLE_HIGH		0x004	Endpoint Enable Register, endpoints 8-10
	ENDPOINTS	0	3

DEVICE_ADDRESS		0x008	USB Device Address Register
	ADDRESS		0	7
	ENABLE		7	1	Device address is active

FRAME_NUMBER_LOW	0x00C	USB Frame Number Low Register
	VALUE		0	8

FRAME_NUMBER_HIGH	0x010	USB Frame Number High Register
	VALUE		0	3

CONTROL			0x018	USB Core Control Register
	ENABLE		0	1	Enable USB core

SETUP_PACKET		0x01C-0x038	4	Setup Packet Byte Register
	DATA		0	8

EP0_STATUS		0x03C	Endpoint 0 Status Register

EP_CONFIG		0x040-0x068	4	Endpoint Configuration Register

GLOBAL_INT_STATUS	0x180	Global Interrupt Status Register (write one to clear)
	SOURCES		0	8

GLOBAL_INT_ENABLE	0x184	Global Interrupt Enable Register
	SOURCES		0	8

DMA0_INT_STATUS		0x188	DMA Channel Group 0 Interrupt Status Register (write one to clear)
	SOURCES		0	8

DMA0_INT_ENABLE		0x18C	DMA Channel Group 0 Interrupt Enable Register
	SOURCES		0	8

DMA1_INT_STATUS		0x190	DMA Channel Group 1 Interrupt Status Register (write one to clear)
	SOURCES		0	2

DMA1_INT_ENABLE		0x194	DMA Channel Group 1 Interrupt Enable Register
	SOURCES		0	2

EVENT_INT_STATUS	0x198	USB Event Interrupt Status Register (write one to clear)
	EVENTS		0	8

EVENT_INT_ENABLE	0x19C	USB Event Interrupt Enable Register
	EVENTS		0	8

EP_A_INT_STATUS_LOW	0x1A0	Endpoint Interrupt Group A Status Register, endpoints 0-7 (write one to clear)
	ENDPOINTS	0	8

EP_A_INT_ENABLE_LOW	0x1A4	Endpoint Interrupt Group A Enable Register, endpoints 0-7
	ENDPOINTS	0	8

EP_A_INT_STATUS_HIGH	0x1A8	Endpoint Interrupt Group A Status Register, endpoints 8-10 (write one to clear)
	ENDPOINTS	0	3

EP_A_INT_ENABLE_HIGH	0x1AC	Endpoint Interrupt Group A Enable Register, endpoints 8-10
	ENDPOINTS	0	3

EP_B_INT_STATUS_LOW	0x1B0	Endpoint Interrupt Group B Status Register, endpoints 0-7 (write one to clear)
	ENDPOINTS	0	8

EP_B_INT_ENABLE_LOW	0x1B4	Endpoint Interrupt Group B Enable Register, endpoints 0-7
	ENDPOINTS	0	8

EP_B_INT_STATUS_HIGH	0x1B8	Endpoint Interrupt Group B Status Register, endpoints 8-10 (write one to clear)
	ENDPOINTS	0	3

EP_B_INT_ENABLE_HIGH	0x1BC	Endpoint Interrupt Group B Enable Register, endpoints 8-10
	ENDPOINTS	0	3

EP_DATA			0x1C0-0x260	0x10	Endpoint FIFO Data Register

EP_CONTROL		0x1C4-0x264	0x10	Endpoint FIFO Control Register

EP_COUNT_LOW		0x1C8-0x268	0x10	Endpoint FIFO Byte Count Low Register
	VALUE		0	8

EP_COUNT_HIGH		0x1CC-0x26C	0x10	Endpoint FIFO Byte Count High Register
	VALUE		0	3

PHY_CONTROL		0x2FC	USB PHY Control and Status Register

CLC				0x800
	*MOD_CLC

CFG				0x804	Wrapper Configuration Register

ID				0x808
	*MOD_ID
