.id 0x1
.type NATIVE
.size 0x200
.name PLL
.qemu pmb887x-pll
.descr Clock Control Unit

.irq
.gpio CLK32

OSC		0x0A0
	PLL_POWER_UP		0	1	Power up PLL
	PHASE0_POWER_UP		1	1	Power up phase-shifter output 0
	PHASE1_POWER_UP		2	1	Power up phase-shifter output 1
	PHASE2_POWER_UP		3	1	Power up phase-shifter output 2
	PHASE3_POWER_UP		4	1	Power up phase-shifter output 3
	PLL_BYPASS_N		8	1	Disable PLL bypass
	PHASE0_BYPASS_N		9	1	Disable bypass for phase-shifter output 0
	PHASE1_BYPASS_N		10	1	Disable bypass for phase-shifter output 1
	PHASE2_BYPASS_N		11	1	Disable bypass for phase-shifter output 2
	PHASE3_BYPASS_N		12	1	Disable bypass for phase-shifter output 3
	NDIV			16	6	PLL feedback divider (multiply by N+1)
	MDIV			24	4	PLL input divider (divide by M+1)

CON0	0x0A4
	PHASE0_CONFIG	0	8	Complete K1/K2 configuration byte for phase-shifter output 0
	PHASE1_CONFIG	8	8	Complete K1/K2 configuration byte for phase-shifter output 1
	PHASE2_CONFIG	16	8	Complete K1/K2 configuration byte for phase-shifter output 2
	PHASE3_CONFIG	24	8	Complete K1/K2 configuration byte for phase-shifter output 3

	PLL1_K2		0	3	Phase 0 divider denominator term, valid values 0..5
	PLL1_K1		3	4	Phase 0 divider: fPLL * 12 / (K1 * 6 + K2)
	
	PLL2_K2		8	3	Phase 1 divider denominator term, valid values 0..5
	PLL2_K1		11	4	Phase 1 divider: fPLL * 12 / (K1 * 6 + K2)
	
	PLL3_K2		16	3	Phase 2 divider denominator term, valid values 0..5
	PLL3_K1		19	4	Phase 2 divider: fPLL * 12 / (K1 * 6 + K2)
	
	PLL4_K2		24	3	Phase 3 divider denominator term, valid values 0..5
	PLL4_K1		27	4	Phase 3 divider: fPLL * 12 / (K1 * 6 + K2)

CON1	0x0A8
	SYSTEM_OUT_CTRL		0	2	Clock Manager state for SYSTEM_OUT
		ON=2
		OFF=3

	FSYS_CLKSEL			16	2	Source clock for fSYS (BYPASS: fSYS=fOSC, PLL: fSYS=fPLL / 2)
		BYPASS=0
		PLL=2
		DISABLE=3
	
	AHB_CLKSEL			20	3	Source clock for fAHB
		BYPASS=0
		PLL0=2
		PLL1=3
		PLL2=4
		PLL3=5
		PLL4=6
	
	FSTM_DIV_EN			25	1	Enable fSTM divider
	FSTM_DIV			28	2	fSTM divider: divide fOSC by 4 * 2^n
		4=0
		8=1
		16=2
		32=3
	
CON2	0x0AC
	CPU_DIV				8	2
	CPU_DIV_EN			12	1
	USB_CLKSEL			14	2	Source clock for USB
		OSC=0
		PHASE3=2
		DISABLE=3
	CLK32_EN			24	1

STAT	0x0B0
	LOCK				13	1

CON3	0x0B4
	USB_CLKDIV			24	2	USB clock divider (divide by 2^n)
SRC		0x0CC
	*MOD_SRC
