.id 0xF003C010, 0xF003C022
.type MODULE
.qemu pmb887x-gprscu
.size 0x200
.name GPRSCU
.descr GPRS Cipher Unit

.irq	INT0
.irq	INT1

CLC		0x00
	*MOD_CLC

ID		0x08
	*MOD_ID

CON		0x10	GPRS Control Register
	INIT			0	1	Start initialization
	DIRECTION		1	1	Data direction
		UPLINK=0
		DOWNLINK=1
	CRC_CTRL		2	1	CRC processing enable
		OFF=0
		ON=1
	CIPH_CTRL		3	1	Cipher processing enable
		OFF=0
		ON=1
	GEA2			4	1	Select GEA2 instead of GEA1
	SEGMENT_MODE		5	1	Segment-list processing mode
	SEGMENT_START		6	1	Start segment-list processing
	SEGMENT_RESET		9	1	Reset segment-list processing state
	BUSY			16	1	Initialization in progress
	GEA3			20	1	Select GEA3 instead of GEA1/2

DATA		0x14	Input and Output FIFO Data Register
	VALUE		0	32

STAT		0x18	FIFO Status Register
	OUTPUT_COUNT	0	6	Bytes available in the output FIFO
	INPUT_FREE	8	6	Bytes free in the input FIFO
	OUTPUT_UNDERRUN	23	1	Output FIFO was read while empty

SEGMENT		0x20	Segment Descriptor Register
	LENGTH		0	11	Segment length in bytes
	CRC_CTRL	18	1	Enable CRC processing for the segment
	CIPH_CTRL	19	1	Enable cipher processing for the segment

INPUT		0x24-0x28	4	Cipher Input Register
	VALUE		0	32

KEY		0x2C-0x38	4	Cipher Key Register
	VALUE		0	32

FCS		0x3C	Frame Check Sequence Register
	VALUE		0	32

POLYNOM		0x44	CRC Polynomial Register
	VALUE		0	32

SRC		0xF8-0xFC
	*MOD_SRC
