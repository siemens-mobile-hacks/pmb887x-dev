.id 0xF046C000, 0xF046C021
.type MODULE
.size 0x200
.name KEYPAD
.qemu pmb887x-keypad
.descr Keypad scanner module

.irq INT0
.irq INT1
.irq INT2
.irq INT3

.gpio	IN0
.gpio	IN1
.gpio	IN2
.gpio	IN3
.gpio	IN4
.gpio	IN5
.gpio	IN6
.gpio	OUT0
.gpio	OUT1
.gpio	OUT2
.gpio	OUT3

ID			0x008
	*MOD_ID

CON			0x010	Keypad Control Register
	NEXT_REPEAT_DELAY	0	4	Delay between repeated key events in 10 ms units, encoded as N - 1
	FIRST_REPEAT_DELAY	8	8	Delay before the first repeated key event in 10 ms units

PORT		0x18-0x20	4	Captured Key Matrix State Register
	STATE		0	32	Four output rows of eight active-low input states

ISR			0x24	Keypad Internal Status Register
	FSM_STATE0	0	1	Keypad state machine state bit 0
	FSM_STATE1	1	1	Keypad state machine state bit 1
	INT0		2	1	Internal interrupt condition 0
	INT1		3	1	Internal interrupt condition 1
	INT2		4	1	Internal interrupt condition 2
	INT3		5	1	Internal interrupt condition 3
	KEY_PRESSED	6	1	At least one key is pressed

INT0_SRC	0x0F0	Key press interrupt service request
	*MOD_SRC

INT1_SRC	0x0F4	Key repeat interrupt service request
	*MOD_SRC

INT2_SRC	0x0F8	Internal interrupt 2 service request
	*MOD_SRC

INT3_SRC	0x0FC	Key release interrupt service request
	*MOD_SRC
