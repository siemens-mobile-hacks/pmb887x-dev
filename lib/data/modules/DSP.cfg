.id 0xF022C010, 0xF022C031
.type MODULE
.name DSP
.qemu pmb887x-dsp
.descr Digital Signal Processor

CLC		0x000
	*MOD_CLC

ID		0x008
	*MOD_ID

COM_SET		0x1C	Communication Flag Set Register (write one to set, reads as zero)
	FLAGS		0	16	Communication flags to set

COM_CLEAR	0x20	Communication Flag Clear Register (write one to clear, reads as zero)
	FLAGS		0	16	Communication flags to clear

COM_STATUS	0x24	Communication Flag Status Register (read-only)
	FLAGS		0	16	Communication flag status

RAM		0x1000-0x2000	4
